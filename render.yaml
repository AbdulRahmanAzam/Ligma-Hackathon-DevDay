services:
  - type: web
    name: ligma
    runtime: docker
    rootDir: .
    dockerfilePath: ./apps/server/Dockerfile
    healthCheckPath: /healthz
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SQLITE_PATH
        value: /var/lib/ligma/ligma.db
      - key: SNAPSHOT_INTERVAL
        value: 200
      - key: ROLE_CACHE_TTL_MS
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: LITESTREAM_R2_ENDPOINT
        sync: false
      - key: LITESTREAM_R2_BUCKET
        sync: false
      - key: LITESTREAM_R2_KEY
        sync: false
      - key: LITESTREAM_R2_SECRET
        sync: false
